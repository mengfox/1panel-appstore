name: 1Panel AppStore CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate 1Panel Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check base directories
        run: |
          set -e

          if [ ! -d "apps" ]; then
            echo "::warning::apps 目录不存在，请确认是否为 1Panel 应用商店仓库"
          else
            echo "apps 目录存在"
          fi

          if [ ! -f "manifest.yml" ] && [ ! -f "manifest.yaml" ]; then
            echo "::warning::manifest.yml 不存在，建议保留"
          else
            echo "manifest 文件存在"
          fi

          echo "基础目录检查完成，不拦截同步"

      - name: Check sensitive host mounts
        run: |
          set -e

          echo "检查 docker-compose.yml 是否挂载敏感宿主机路径..."

          files="$(find apps -type f \( -name 'docker-compose.yml' -o -name 'docker-compose.yaml' \) 2>/dev/null | sort || true)"

          if [ -z "$files" ]; then
            echo "::warning::未找到 docker-compose.yml 或 docker-compose.yaml，跳过敏感路径检查"
            exit 0
          fi

          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          files = sorted(
              list(Path("apps").rglob("docker-compose.yml")) +
              list(Path("apps").rglob("docker-compose.yaml"))
          )

          failed = False

          # 只拦截真正高危的宿主机路径
          denied_exact_paths = {
              "/",
              "/etc",
              "/root",
              "/proc",
              "/sys",
              "/var/run/docker.sock",
              "/run/docker.sock",
              "/var/lib/docker",
          }

          denied_prefixes = (
              "/root/",
              "/proc/",
              "/sys/",
              "/var/lib/docker/",
          )

          def is_sensitive_host_path(path: str):
              path = path.strip().strip("'").strip('"')

              if not path.startswith("/"):
                  return False, ""

              if path in denied_exact_paths:
                  return True, f"禁止挂载敏感宿主机路径：{path}"

              if path.startswith(denied_prefixes):
                  return True, f"禁止挂载敏感宿主机路径：{path}"

              return False, ""

          def report_error(file, line_no, msg, raw):
              global failed
              failed = True
              print(f"::error file={file},line={line_no}::{msg}")
              print(f"  -> {raw}")

          for file in files:
              print(f"检查：{file}")
              lines = file.read_text(encoding="utf-8", errors="ignore").splitlines()

              for idx, raw in enumerate(lines, start=1):
                  line = raw.strip()

                  if not line or line.startswith("#"):
                      continue

                  # 短语法挂载：
                  # - /host/path:/container/path:ro
                  # - "/host/path:/container/path:ro"
                  short_match = re.match(r"""^-\s*['"]?([^'"]+)['"]?\s*(#.*)?$""", line)
                  if short_match:
                      volume = short_match.group(1).strip()

                      if ":" in volume:
                          host_path = volume.split(":", 1)[0].strip().strip("'").strip('"')
                          sensitive, msg = is_sensitive_host_path(host_path)
                          if sensitive:
                              report_error(file, idx, msg, raw)
                      continue

                  # 长语法挂载：
                  # source: /host/path
                  # src: /host/path
                  # device: /host/path
                  long_match = re.match(r"""^(source|src|device):\s*['"]?([^'"]+)['"]?\s*(#.*)?$""", line)
                  if long_match:
                      host_path = long_match.group(2).strip().strip("'").strip('"')
                      sensitive, msg = is_sensitive_host_path(host_path)
                      if sensitive:
                          report_error(file, idx, msg, raw)
                      continue

          if failed:
              print("检测到敏感宿主机路径挂载，请根据上方 file 和 line 修改。")
              sys.exit(1)

          print("敏感路径检查通过")
          PY

  sync-cnb:
    name: Sync GitHub to CNB
    runs-on: ubuntu-latest
    needs:
      - validate

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CNB token
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -e

          if [ -z "$CNB_TOKEN" ]; then
            echo "::error::未配置 GitHub Secret：CNB_TOKEN"
            echo "请到 GitHub 仓库 Settings -> Secrets and variables -> Actions 添加 CNB_TOKEN"
            exit 1
          fi

      - name: Sync to CNB
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote remove cnb 2>/dev/null || true
          git remote add cnb "https://cnb:${CNB_TOKEN}@cnb.cool/mengfox/1panel-appstore"

          git push cnb HEAD:main --force