networks:
    1panel-network:
        external: true
        name: 1panel-network

services:
    xarrpay-merchant:
        container_name: ${CONTAINER_NAME}
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        entrypoint:
            - sh
            - /1panel/start.sh
        env_file:
            - .env
        environment:
            TZ: Asia/Shanghai
            APP_DIR: /app
            APP_SRC_DIR: /opt/xarrpay-merchant
            APP_BIN_NAME: xarr-pay-merchant
            SESSION_DIR: /tmp/session
        image: xarrpay/xarrpay-merchant:1.5.0.3
        labels:
            createdBy: Apps
        networks:
            1panel-network:
                mac_address: ${PANEL_APP_MAC_ADDRESS}
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:32000
        restart: always
        volumes:
            - ./data/xarrpay-merchant:/app
            - ./scripts/start.sh:/1panel/start.sh:ro
            - /etc/localtime:/etc/localtime:ro