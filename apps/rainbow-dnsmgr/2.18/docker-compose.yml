networks:
  1panel-network:
    external: true

services:
  rainbow-dnsmgr:
    image: netcccyun/dnsmgr@sha256:3a2eec22c98a4aeca12a870e529a4e98b18906f76b2b8b0f8536bdcc899a9a98
    container_name: ${CONTAINER_NAME}
    restart: always
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    environment:
      TZ: Asia/Shanghai
      PANEL_DB_HOST: ${PANEL_DB_HOST}
      PANEL_DB_PORT: ${PANEL_DB_PORT}
      PANEL_DB_NAME: ${PANEL_DB_NAME}
      PANEL_DB_USER: ${PANEL_DB_USER}
      PANEL_DB_USER_PASSWORD: ${PANEL_DB_USER_PASSWORD}
      PANEL_DB_PREFIX: ${PANEL_DB_PREFIX}
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    ports:
      - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/rainbow-dnsmgr:/app/www
