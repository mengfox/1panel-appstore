networks:
    1panel-network:
        external: true
services:   
    rainbow-dnsmgr:
        container_name: ${CONTAINER_NAME}
        stdin_open: true
        tty: true
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - TZ=Asia/Shanghai
        image: netcccyun/dnsmgr:latest
        labels:
            createdBy: Apps
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
        restart: always
        volumes:
            # 挂载已初始化的目录
            - ./data/rainbow-dnsmgr:/app/www