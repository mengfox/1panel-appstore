networks:
  1panel-network:
    external: true

services:
  rainbow-dnsmgr:
    image: netcccyun/dnsmgr@sha256:815c780af440c84b29074fc33ffea2ba419bc1619715bb6519a406c0137d8336
    container_name: ${CONTAINER_NAME}
    restart: always
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
    environment:
      TZ: Asia/Shanghai
      PANEL_DB_HOST: ${PANEL_DB_HOST}
      PANEL_DB_PORT: ${PANEL_DB_PORT}
      PANEL_DB_NAME: ${PANEL_DB_NAME}
      PANEL_DB_USER: ${PANEL_DB_USER}
      PANEL_DB_USER_PASSWORD: ${PANEL_DB_USER_PASSWORD}
      PANEL_DB_PREFIX: ${PANEL_DB_PREFIX}
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    ports:
      - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
    volumes:
      - ./data/rainbow-dnsmgr:/app/www
