additionalProperties:
  formFields:
    - default: mysql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      required: true
      type: apps
      values:
        - label: MySQL
          value: mysql
        - label: MariaDB
          value: mariadb
      child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Host
        labelZh: 数据库主机
        required: true
        type: service
    - default: 3306
      edit: true
      envKey: PANEL_DB_PORT
      labelEn: Database Port
      labelZh: 数据库端口
      required: true
      rule: paramPort
      type: number
    - default: dnsmgr
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: dnsmgr
      envKey: PANEL_DB_USER
      labelEn: Database User
      labelZh: 数据库用户
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: ""
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Database Password
      labelZh: 数据库密码
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: dnsmgr_
      envKey: PANEL_DB_PREFIX
      labelEn: Table Prefix
      labelZh: 数据表前缀
      required: true
      rule: paramCommon
      type: text
    - default: 10880
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Web Port
      labelZh: Web 端口
      required: true
      rule: paramPort
      type: number
