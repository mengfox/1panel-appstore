networks:
    1panel-network:
        external: true
services:
    zjmf-finance:
        container_name: ${CONTAINER_NAME}
        stdin_open: true
        tty: true
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - TZ=Asia/Shanghai
            - APP_DIR=/var/www/html
            - APP_SEED_DIR=/opt/zjmf-finance-seed
            - SESSION_DIR=/tmp/session
            - PANEL_DB_TYPE=${PANEL_DB_TYPE}
            - PANEL_DB_HOST=${PANEL_DB_HOST}
            - PANEL_DB_PORT=${PANEL_DB_PORT}
            - PANEL_DB_CHARSET=${PANEL_DB_CHARSET}
            - PANEL_DB_NAME=${PANEL_DB_NAME}
            - PANEL_DB_USER=${PANEL_DB_USER}
            - PANEL_DB_USER_PASSWORD=${PANEL_DB_USER_PASSWORD}
            - PANEL_ADMIN_DIR=${PANEL_ADMIN_DIR}
        entrypoint:
            - /bin/sh
            - /opt/1panel-zjmf-finance-start.sh
        image: mengfox/zjmf-finance:3.7.0
        labels:
            createdBy: Apps
        extra_hosts:
            - host.docker.internal:host-gateway
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
        restart: always
        volumes:
            - ./data/zjmf-finance:/var/www/html
            - ./data/session:/tmp/session
            - ./scripts/start-wrapper.sh:/opt/1panel-zjmf-finance-start.sh:ro
