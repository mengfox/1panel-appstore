additionalProperties:
    formFields:
        - child:
            default: ""
            envKey: PANEL_DB_HOST
            required: true
            type: service
          default: mysql
          envKey: PANEL_DB_TYPE
          labelEn: Database
          labelZh: 数据库服务
          required: true
          type: apps
          values:
            - label: MySQL
              value: mysql
            - label: MariaDB
              value: mariadb
        - default: 3306
          envKey: PANEL_DB_PORT
          labelEn: Database port
          labelZh: 数据库端口
          required: true
          rule: paramPort
          type: number
        - default: utf8mb4
          envKey: PANEL_DB_CHARSET
          labelEn: Database charset
          labelZh: 数据库编码
          required: true
          type: text
        - default: zjmfmanger
          envKey: PANEL_DB_NAME
          labelEn: Database name
          labelZh: 数据库名
          random: true
          required: true
          rule: paramCommon
          type: text
        - default: username
          envKey: PANEL_DB_USER
          labelEn: Database username
          labelZh: 数据库用户
          random: true
          required: true
          rule: paramCommon
          type: text
        - default: password
          envKey: PANEL_DB_USER_PASSWORD
          labelEn: Database password
          labelZh: 数据库密码
          random: true
          required: true
          rule: paramComplexity
          type: password
        - default: 8090
          edit: true
          envKey: PANEL_APP_PORT_HTTP
          labelEn: Port
          labelZh: HTTP 端口
          required: true
          rule: paramPort
          type: number