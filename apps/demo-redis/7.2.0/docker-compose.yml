networks:
  1panel-network:
    external: true

services:
  demo-redis:
    image: redis:7.2-alpine
    container_name: ${CONTAINER_NAME}
    restart: always
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    ports:
      - ${HOST_IP}:${PANEL_APP_PORT_REDIS}:6379
    environment:
      TZ: Asia/Shanghai
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - ${REDIS_DATA_PATH}:/data
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
