services:
  mtab:
    image: itushan/mtab:2.9.3
    container_name: ${CONTAINER_NAME}
    restart: always
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    volumes:
      - ./data:/app
    env_file:
      - .env
    entrypoint: [ "sh", "-c", "sleep 5 && ./start.sh" ]
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
    name: 1panel-network
