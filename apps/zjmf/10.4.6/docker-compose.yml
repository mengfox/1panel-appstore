networks:
    1panel-network:
        external: true
services:
    zjmf:
        container_name: ${CONTAINER_NAME}
        stdin_open: true
        tty: true
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            - TZ=Asia/Shanghai
            - APP_DIR=/var/www/html
            - ENABLE_SWOOLE_LOADER=0
            - PANEL_DB_TYPE=${PANEL_DB_TYPE}
            - PANEL_DB_HOST=${PANEL_DB_HOST}
            - PANEL_DB_PORT=${PANEL_DB_PORT}
            - PANEL_DB_CHARSET=${PANEL_DB_CHARSET}
            - PANEL_DB_NAME=${PANEL_DB_NAME}
            - PANEL_DB_USER=${PANEL_DB_USER}
            - PANEL_DB_USER_PASSWORD=${PANEL_DB_USER_PASSWORD}
        entrypoint:
            - /bin/sh
            - /opt/1panel-zjmf-start.sh
        image: mengfox/zjmf:10.4.6
        labels:
            createdBy: Apps
        extra_hosts:
            - host.docker.internal:host-gateway
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
        restart: always
        volumes:
            - ./data/zjmf:/var/www/html
            - ./scripts/start-wrapper.sh:/opt/1panel-zjmf-start.sh:ro