networks:
  1panel-network:
    external: true

services:
  demo-nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_NAME}
    restart: always
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    ports:
      - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:80
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ${APP_HTML_PATH}:/usr/share/nginx/html
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: ${CPUS}
          memory: ${MEMORY_LIMIT}
